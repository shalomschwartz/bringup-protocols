<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>פרוטוקול פגישה — BringUp</title>
<style>
@media print {
  .noprint { display: none !important; }
  body { margin: 0; padding: 0; background: #fff; }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, 'Segoe UI', sans-serif;
  background: #666;
  direction: rtl;
}
.toolbar {
  position: fixed; top: 0; left: 0; right: 0;
  background: #1f8c5f; color: #fff;
  padding: 10px 20px; display: flex; align-items: center; gap: 12px;
  z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.toolbar-title { flex: 1; font-size: 15px; font-weight: 500; }
.toolbar button {
  background: rgba(255,255,255,0.2); color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 6px 16px; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-family: inherit;
}
.toolbar button:hover { background: rgba(255,255,255,0.35); }

.pages {
  padding-top: 60px;
  display: flex; flex-direction: column; align-items: center;
  gap: 20px; padding-bottom: 40px;
}

/* Each page: flow layout, background image via CSS */
.page {
  width: 794px;
  min-height: 1123px;
  background-color: #fff;
  background-size: 794px 1123px;
  background-repeat: no-repeat;
  background-position: top left;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  padding: 0;
  position: relative;
}
.page-1 { background-image: url('bgimg/bg00001.jpg'); }
.page-2 { background-image: url('bgimg/bg00002.jpg'); }

/* Content area inside the letterhead safe zone */
.content-area {
  padding: 135px 66px 100px 66px;
  font-size: 14px;
  color: #000;
  line-height: 1.7;
}
.page-2 .content-area {
  padding-top: 90px;
}

.doc-date {
  text-align: left;
  direction: ltr;
  margin-bottom: 12px;
}
.doc-line { margin-bottom: 8px; text-align: right; }
.doc-subject { margin-bottom: 8px; text-align: right; }
.doc-subject u { font-weight: bold; }
.doc-intro { margin-top: 12px; margin-bottom: 12px; text-align: right; }

/* Task table */
.task-table {
  width: 100%;
  border-collapse: collapse;
  direction: rtl;
  font-size: 12px;
  margin-bottom: 16px;
  background: #fff;
}
.task-table th {
  background: #e8e8e8;
  border: 1px solid #000;
  padding: 6px 8px;
  font-weight: bold;
  text-align: center;
  font-size: 12px;
}
.task-table td {
  background: #fff;
  border: 1px solid #000;
  padding: 5px 8px;
  vertical-align: top;
  font-size: 12px;
  line-height: 1.5;
}
.col-num { width: 35px; text-align: center; }
.col-owner { width: 100px; text-align: center; }
.col-date { width: 80px; text-align: center; }

.doc-footer {
  margin-top: 30px;
  font-size: 13px;
  line-height: 1.8;
}

.error-state {
  text-align: center; padding: 100px 20px;
  color: #ccc; font-size: 16px;
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<div class="toolbar noprint">
  <div class="toolbar-title" id="toolbar-title">פרוטוקול פגישה — BringUp</div>
  <button onclick="downloadPDF()">📥 הורד PDF</button>
  <button onclick="window.close()">✕ סגור</button>
</div>

<div class="pages" id="pages">
  <div class="error-state" id="error-state" style="display:none;">
    <p>לא נמצאו נתוני פרוטוקול</p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const raw = localStorage.getItem('bringup_protocol');
  if (!raw) { document.getElementById('error-state').style.display = 'block'; return; }

  let data;
  try { data = JSON.parse(raw); }
  catch (e) { document.getElementById('error-state').style.display = 'block'; return; }

  const { projectName, date, location, participants, tasks, phase, recorder } = data;

  document.getElementById('toolbar-title').textContent = 'פרוטוקול פגישה — ' + (projectName || 'BringUp');
  document.title = (projectName || '') + ' — סיכום פגישה שבועית מתאריך ' + formatDate(date);

  const formattedDate = formatDate(date);
  const participantNames = (participants || []).join(', ');

  // Build single page with flow layout (html2pdf handles this reliably)
  const page = document.createElement('div');
  page.className = 'page page-1';

  let html = '<div class="content-area">';
  html += '<div class="doc-date">' + formattedDate + '</div>';
  html += '<div class="doc-line">לכבוד רשימת התפוצה</div>';
  html += '<div class="doc-subject">הנדון – <u>' + esc(projectName || '') + ' – סיכום פגישה שבועית מתאריך ' + formattedDate + '</u></div>';
  html += '<div class="doc-line">משתתפים : ' + esc(participantNames) + '</div>';
  if (location) html += '<div class="doc-line">מיקום הפגישה : ' + esc(location) + '</div>';
  if (phase) html += '<div class="doc-line">בשלב ביצוע הפגישה : ' + esc(phase) + '</div>';
  html += '<div class="doc-intro">להלן הסיכומים:-</div>';

  // Task table
  if (tasks && tasks.length > 0) {
    html += '<table class="task-table"><thead><tr>';
    html += '<th class="col-num">ספ\'</th><th>הסיכום</th><th class="col-owner">אחריות</th><th class="col-date">לביצוע עד.</th>';
    html += '</tr></thead><tbody>';
    tasks.forEach((t, i) => {
      html += '<tr>';
      html += '<td class="col-num">.' + (i + 1) + '</td>';
      html += '<td>' + esc(t.desc || t.name || '') + '</td>';
      html += '<td class="col-owner">' + esc(t.owner || '') + '</td>';
      html += '<td class="col-date">' + (t.date ? formatDate(t.date) : '') + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }

  // Footer
  html += '<div class="doc-footer">';
  html += '<div>רשם: ' + esc(recorder || '') + '</div>';
  html += '<div>תפוצה : משתתפי הפגישה' + (participantNames ? ', ' + esc(participantNames) : '') + '</div>';
  html += '</div>';

  html += '</div>';
  page.innerHTML = html;

  const container = document.getElementById('pages');
  container.appendChild(page);

  // Auto-download PDF if ?auto=1
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('auto') === '1') {
    // Wait for background image to load
    const img = new Image();
    img.src = 'bgimg/bg00001.jpg';
    img.onload = () => { setTimeout(downloadPDF, 500); };
    img.onerror = () => { setTimeout(downloadPDF, 500); };
  }
});

function formatDate(dateStr) {
  if (!dateStr) return '';
  const p = dateStr.split('-');
  return p.length === 3 ? p[2] + '.' + p[1] + '.' + p[0] : dateStr;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

function downloadPDF() {
  const pages = document.getElementById('pages');
  const filename = document.title.replace(/[^\u0590-\u05FFa-zA-Z0-9 _\-]/g, '').trim() || 'protocol';

  const opt = {
    margin: 0,
    filename: filename + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: {
      scale: 2,
      useCORS: true,
      scrollY: 0,
      logging: false,
      backgroundColor: '#ffffff',
    },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak: { mode: ['css'], before: '.page-break' },
  };

  const toolbar = document.querySelector('.toolbar');
  const btn = toolbar ? toolbar.querySelector('button') : null;
  const origText = btn ? btn.textContent : '';
  if (btn) { btn.textContent = '⏳ מייצר PDF...'; btn.disabled = true; }

  html2pdf().set(opt).from(pages).save().then(() => {
    if (btn) { btn.textContent = origText; btn.disabled = false; }
  }).catch((err) => {
    console.error('PDF generation error:', err);
    if (btn) { btn.textContent = origText; btn.disabled = false; }
    alert('שגיאה בייצור PDF. נסה שוב.');
  });
}
</script>
</body>
</html>
