<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>פרוטוקול פגישה — BringUp</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #666; direction: rtl; }
.toolbar {
  position: fixed; top: 0; left: 0; right: 0;
  background: #1f8c5f; color: #fff;
  padding: 10px 20px; display: flex; align-items: center; gap: 12px;
  z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.toolbar-title { flex: 1; font-size: 15px; font-weight: 500; }
.toolbar button {
  background: rgba(255,255,255,0.2); color: #fff;
  border: 1px solid rgba(255,255,255,0.3);
  padding: 6px 16px; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-family: inherit;
}
.toolbar button:hover { background: rgba(255,255,255,0.35); }
.preview-area {
  padding-top: 60px;
  display: flex; flex-direction: column; align-items: center;
  gap: 20px; padding-bottom: 40px;
}
.status-msg {
  color: #fff; font-size: 16px; text-align: center; padding: 60px 20px;
}
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>

<div class="toolbar" id="toolbar">
  <div class="toolbar-title" id="toolbar-title">פרוטוקול פגישה — BringUp</div>
  <button id="dl-btn" onclick="generatePDF()">📥 הורד PDF</button>
  <button onclick="window.close()">✕ סגור</button>
</div>

<div class="preview-area" id="preview-area">
  <div class="status-msg" id="status-msg">טוען...</div>
</div>

<script>
const PAGE_W = 794;
const PAGE_H = 1123;
const TABLE_LEFT = 67.757309;
const TABLE_W = 643.454102;
const HEADER_ROW_H = 27.362671;

const COL_RESP = 95;
const COL_DATE = 95;
const COL_DESC = 407;
const COL_NUM = 46;

const P1_TABLE_TOP = 324.577484;
const P1_TABLE_H = 663.196411;
const P1_DATA_H = P1_TABLE_H - HEADER_ROW_H;
const P1_MAX = 10;
const P1_ROW_H = P1_DATA_H / P1_MAX;

const P2_TABLE_TOP = 128;
const P2_TABLE_H = 370;
const P2_DATA_H = P2_TABLE_H - HEADER_ROW_H;
const P2_MAX = 5;
const P2_ROW_H = P2_DATA_H / P2_MAX;

let protocolData = null;
let bg1Base64 = '';
let bg2Base64 = '';

document.addEventListener('DOMContentLoaded', async () => {
  const raw = localStorage.getItem('bringup_protocol');
  if (!raw) { document.getElementById('status-msg').textContent = 'לא נמצאו נתוני פרוטוקול'; return; }

  try { protocolData = JSON.parse(raw); }
  catch (e) { document.getElementById('status-msg').textContent = 'שגיאה בקריאת הנתונים'; return; }

  const { projectName, date } = protocolData;
  document.getElementById('toolbar-title').textContent = 'פרוטוקול פגישה — ' + (projectName || 'BringUp');
  document.title = (projectName || '') + ' — סיכום פגישה שבועית מתאריך ' + formatDate(date);

  // Convert background images to base64 (bypass CORS)
  document.getElementById('status-msg').textContent = 'טוען תמונות רקע...';
  try {
    [bg1Base64, bg2Base64] = await Promise.all([
      toBase64('bgimg/bg00001.jpg'),
      toBase64('bgimg/bg00002.jpg'),
    ]);
  } catch (e) {
    console.error('Failed to load bg images:', e);
    document.getElementById('status-msg').textContent = 'שגיאה בטעינת תמונות הרקע';
    return;
  }

  // Show preview
  renderPreview();

  // Auto-download if ?auto=1
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('auto') === '1') {
    setTimeout(generatePDF, 300);
  }
});

function renderPreview() {
  const html = buildDocumentHTML(protocolData, bg1Base64, bg2Base64);
  const preview = document.getElementById('preview-area');
  preview.innerHTML = '';

  // Parse and show pages as preview
  const parser = new DOMParser();
  const parsed = parser.parseFromString(html, 'text/html');
  parsed.querySelectorAll('body > div').forEach(page => {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'box-shadow: 0 2px 12px rgba(0,0,0,0.3); margin: 0;';
    wrapper.appendChild(document.adoptNode(page));
    preview.appendChild(wrapper);
  });
}

function buildDocumentHTML(data, bg1, bg2) {
  const formattedDate = formatDate(data.date);
  const participants = (data.participants || []).join(', ');
  const tasks = data.tasks || [];

  const pageStyle = 'width:' + PAGE_W + 'px;height:' + PAGE_H + 'px;position:relative;overflow:hidden;background:#fff;';
  const bgStyle = 'position:absolute;top:0;left:0;width:' + PAGE_W + 'px;height:' + PAGE_H + 'px;z-index:0;';
  const txtStyle = 'z-index:1;font-size:14px;font-family:Arial,sans-serif;';

  const page1Tasks = tasks.slice(0, P1_MAX);
  const page2Tasks = tasks.slice(P1_MAX, P1_MAX + P2_MAX);
  const needsPage2 = tasks.length > P1_MAX;

  // Footer text
  const footerY = PAGE_H - 85;
  const footerHTML = '<div style="position:absolute;top:' + footerY + 'px;right:66px;left:66px;' + txtStyle + 'font-size:13px;direction:rtl;line-height:1.8;">'
    + '<div>רשם: ' + esc(data.recorder || '') + '</div>'
    + '<div>תפוצה : משתתפי הפגישה' + (participants ? ', ' + esc(participants) : '') + '</div>'
    + '</div>';

  // Build page 1
  let p1 = '<div style="' + pageStyle + '">';
  p1 += '<img style="' + bgStyle + '" src="' + bg1 + '" />';
  p1 += '<span style="position:absolute;top:132.6px;left:66.5px;' + txtStyle + 'direction:ltr;">' + formattedDate + '</span>';
  p1 += '<span style="position:absolute;top:165.6px;right:26px;' + txtStyle + 'direction:rtl;">לכבוד רשימת התפוצה</span>';
  p1 += '<div style="position:absolute;top:199.9px;left:0;width:' + PAGE_W + 'px;text-align:center;' + txtStyle + 'direction:rtl;">הנדון – <strong><u>' + esc(data.projectName || '') + ' – סיכום פגישה שבועית מתאריך ' + formattedDate + '</u></strong></div>';
  p1 += '<span style="position:absolute;top:234.5px;right:26px;' + txtStyle + 'direction:rtl;">משתתפים : ' + esc(participants) + '</span>';

  let nextTop = 268.9;
  if (data.location) {
    p1 += '<span style="position:absolute;top:' + nextTop + 'px;right:26px;' + txtStyle + 'direction:rtl;">מיקום הפגישה : ' + esc(data.location) + '</span>';
    nextTop += 25;
  }
  if (data.phase) {
    p1 += '<span style="position:absolute;top:' + nextTop + 'px;right:26px;' + txtStyle + 'direction:rtl;max-width:600px;">בשלב ביצוע הפגישה : ' + esc(data.phase) + '</span>';
    nextTop += 25;
  }
  p1 += '<span style="position:absolute;top:' + nextTop + 'px;right:26px;' + txtStyle + 'direction:rtl;">להלן הסיכומים:-</span>';
  p1 += makeTable(P1_TABLE_TOP, makeRows(page1Tasks, 0, P1_ROW_H, P1_MAX));
  if (!needsPage2) p1 += footerHTML;
  p1 += '</div>';

  // Build page 2 if needed
  let p2 = '';
  if (needsPage2) {
    p2 = '<div style="' + pageStyle + '">';
    p2 += '<img style="' + bgStyle + '" src="' + bg2 + '" />';
    p2 += makeTable(P2_TABLE_TOP, makeRows(page2Tasks, P1_MAX, P2_ROW_H, P2_MAX));
    p2 += footerHTML;
    p2 += '</div>';
  }

  return '<!DOCTYPE html><html lang="he"><head><meta charset="UTF-8"></head><body style="margin:0;padding:0;font-family:Arial,sans-serif;">' + p1 + p2 + '</body></html>';
}

function th(w, label) {
  return '<th style="width:' + w + 'px;border:1px solid #000;font-size:14px;font-family:Arial,sans-serif;font-weight:bold;text-align:center;vertical-align:middle;padding:2px 4px;background:white;">' + label + '</th>';
}

function makeRows(tasks, startIdx, rowH, maxRows) {
  const cellStyle = 'vertical-align:middle;padding:3px 4px;font-size:14px;font-family:Arial,sans-serif;background:white;border:1px solid #000;';

  let filled = '';
  tasks.forEach((task, i) => {
    filled += '<tr style="height:' + rowH + 'px;">';
    filled += '<td style="width:' + COL_RESP + 'px;text-align:center;' + cellStyle + 'word-wrap:break-word;">' + esc(task.owner || '') + '</td>';
    filled += '<td style="width:' + COL_DATE + 'px;text-align:center;' + cellStyle + '">' + (task.date ? formatDate(task.date) : '') + '</td>';
    filled += '<td style="width:' + COL_DESC + 'px;text-align:right;padding:3px 8px;' + cellStyle + 'direction:rtl;word-wrap:break-word;">' + esc(task.desc || task.description || '') + '</td>';
    filled += '<td style="width:' + COL_NUM + 'px;text-align:center;' + cellStyle + '">' + (startIdx + i + 1) + '</td>';
    filled += '</tr>';
  });

  let empty = '';
  for (let i = 0; i < maxRows - tasks.length; i++) {
    empty += '<tr style="height:' + rowH + 'px;">';
    empty += '<td style="background:white;border:1px solid #000;"></td>';
    empty += '<td style="background:white;border:1px solid #000;"></td>';
    empty += '<td style="background:white;border:1px solid #000;"></td>';
    empty += '<td style="background:white;border:1px solid #000;"></td>';
    empty += '</tr>';
  }
  return filled + empty;
}

function makeTable(top, rows) {
  return '<table style="position:absolute;top:' + top + 'px;left:' + TABLE_LEFT + 'px;width:' + TABLE_W + 'px;border-collapse:collapse;z-index:1;direction:ltr;">'
    + '<thead><tr style="height:' + HEADER_ROW_H + 'px;">'
    + th(COL_RESP, 'אחריות') + th(COL_DATE, 'לביצוע עד') + th(COL_DESC, 'הסיכום') + th(COL_NUM, "ס'פ")
    + '</tr></thead><tbody>' + rows + '</tbody></table>';
}

async function generatePDF() {
  const btn = document.getElementById('dl-btn');
  if (btn) { btn.textContent = '⏳ מייצר PDF...'; btn.disabled = true; }

  try {
    const { jsPDF } = window.jspdf;
    const html = buildDocumentHTML(protocolData, bg1Base64, bg2Base64);

    const parser = new DOMParser();
    const parsed = parser.parseFromString(html, 'text/html');

    // Hidden render container
    const container = document.createElement('div');
    container.style.cssText = 'position:fixed;top:0;left:0;width:' + PAGE_W + 'px;z-index:-1;pointer-events:none;opacity:0;';
    document.body.appendChild(container);

    parsed.querySelectorAll('body > div').forEach(page => {
      container.appendChild(document.adoptNode(page));
    });

    const pdf = new jsPDF({ orientation: 'portrait', unit: 'px', format: [PAGE_W, PAGE_H] });
    const pages = Array.from(container.children);

    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], {
        scale: 2, useCORS: false,
        width: PAGE_W, height: PAGE_H,
        windowWidth: PAGE_W, windowHeight: PAGE_H,
        scrollX: 0, scrollY: 0,
      });
      if (i > 0) pdf.addPage();
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, PAGE_W, PAGE_H);
    }

    document.body.removeChild(container);

    const filename = (protocolData.projectName || 'protocol') + ' - סיכום פגישה ' + formatDate(protocolData.date) + '.pdf';
    pdf.save(filename);

    if (btn) { btn.textContent = '✓ PDF הורד'; btn.disabled = false; }
  } catch (e) {
    console.error('PDF generation error:', e);
    if (btn) { btn.textContent = '📥 הורד PDF'; btn.disabled = false; }
    alert('שגיאה בייצור PDF: ' + (e.message || e));
  }
}

function toBase64(url) {
  return fetch(url).then(r => r.blob()).then(blob => new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result);
    reader.onerror = rej;
    reader.readAsDataURL(blob);
  }));
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const p = dateStr.split('-');
  return p.length === 3 ? p[2] + '.' + p[1] + '.' + p[0] : dateStr;
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
</script>
</body>
</html>
